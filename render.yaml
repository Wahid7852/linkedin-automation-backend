services:
  - type: web
    name: linkedin-profile-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: uvicorn linkedin_backend.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LI_AT
        sync: false
      - key: LI_JSESSIONID
        sync: false
